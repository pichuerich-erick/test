<style>
:root{
--accent:#FF7A00;
--accent2:#ffae00;
--dark:#0a0a0a;
--gray:#1c1c1c;
--transition:all .4s cubic-bezier(.8,0,.2,1);
}

*{box-sizing:border-box;margin:0;padding:0;scroll-behavior:smooth}
body{font-family:'Inter',sans-serif;background:#000;color:#fff;overflow-x:hidden}
h1,h2,h3,nav a,.btn, .promo-price{font-family:'Teko',sans-serif;text-transform:uppercase;letter-spacing:1px}
section{padding:80px 10%;position:relative; z-index: 1;}

/* ================= PARTICLES (FIXED BACKGROUND) ================= */
#particles {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    z-index: 0;
    pointer-events: none;
}

/* ================= NAV ================= */
nav{
position:fixed;
top:0;
width:100%;
background:rgba(0,0,0,0.9);
display:flex;
justify-content:space-between;
align-items:center;
padding:12px 5%;
border-bottom:2px solid var(--accent);
z-index:1000;
backdrop-filter: blur(10px);
}
.logo-img { height: 45px; width: auto; filter: drop-shadow(0 0 8px var(--accent)); }
nav .links{display:flex;gap:15px; align-items: center;}
nav a{color:#fff;text-decoration:none;font-size:1rem;transition:.3s}
nav a:hover{color:var(--accent)}
nav .cta{background:var(--accent);padding:8px 15px;color:#000; font-weight: bold;}

/* ================= HERO ================= */
header {
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    align-items: center;
    text-align: center;
    position: relative;
    padding-bottom: -100px;
}
.hero-innovador {
    font-family: 'Oswald',sans-serif;
    font-weight: bold;
    font-size: 1.5rem;
    color: #fff;
    text-transform: uppercase;
    max-width: 800px;
    line-height: 1.4;
    letter-spacing: 1px;
    text-shadow: 2px 2px 15px rgba(0,0,0,0.8);
}

.video-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: -2; }
header::before { content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(transparent 40%, #000 95%); z-index: -1; }

.hero-text-container { z-index: 20; margin-bottom: -20px; }

.btn{ display:inline-block; margin-top:20px; padding:15px 40px; background:var(--accent); color:#000; text-decoration:none; font-size:1.4rem; transform:skewX(-12deg); transition:var(--transition); }
.btn:hover{background:var(--accent2); box-shadow:0 0 30px var(--accent); transform:skewX(-12deg) scale(1.05)}

/* ================= CAROUSEL INFINITO SEAMLESS ================= */
.carousel-viewport { overflow: hidden; width: 100%; padding: 20px 0; }
.carousel-track { 
    display: flex; 
    width: max-content; 
    animation: scroll linear infinite; 
}
/* El truco es que el track se mueva exactamente -50% del ancho total (que contiene los elementos duplicados) */
@keyframes scroll { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }


/* ================= SECTIONS STYLE ================= */
.service-card{ min-width: 280px; margin: 0 15px; background: var(--gray); padding: 30px; border-top: 3px solid var(--accent); text-align: center; }
.learn-more { color: var(--accent); text-decoration: none; font-size: 0.9rem; font-weight: bold; border-bottom: 1px solid var(--accent); margin-top: 15px; display: inline-block; }

/* PORTFOLIO LIGHTBOX */
.portfolio-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; margin-top: 40px; }
.portfolio-thumb { width: 100%; aspect-ratio: 1/1; object-fit: cover; cursor: pointer; border: 1px solid #333; transition: .3s; }
.portfolio-thumb:hover { border-color: var(--accent); transform: scale(1.05); }

#lightbox { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 5000; justify-content: center; align-items: center; }
#lightbox img { max-width: 90%; max-height: 80%; border: 2px solid var(--accent); }
.close-lightbox { position: absolute; top: 20px; right: 30px; color: #fff; font-size: 40px; cursor: pointer; }

/* BRANDS */
.brand-frame { width: 180px; height: 110px; margin: 0 15px; border: 1px solid #222; display: flex; align-items: center; justify-content: center; background: #0a0a0a; }
.brand-frame img { max-width: 70%; max-height: 50%; filter: grayscale(1); transition: .3s; }
.brand-frame:hover img { filter: grayscale(0); }


/* COTIZA SECTION */
.cotiza-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
    margin-top: 40px;
}
.cotiza-card {
    background: var(--gray);
    padding: 40px 20px;
    border: 1px solid #333;
    transition: .3s;
    text-decoration: none;
    color: inherit;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 15px;
}
.cotiza-card:hover { border-color: var(--accent); transform: translateY(-5px); }
.cotiza-card h3 { font-size: 2rem; color: var(--accent); }
.cotiza-card.wa-btn { background: linear-gradient(145deg, #1c1c1c, #052c14); }


/* PROMOTIONS */
.promo-card { min-width: 300px; margin: 0 15px; background: linear-gradient(145deg, #1c1c1c, #000); border: 1px solid #333; padding: 30px; text-align: center; }
.promo-card i { color: var(--accent); margin-bottom: 15px; }

/* CONTACT */
.contact-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-top: 40px; }
.info-box { background: rgba(28,28,28,0.8); padding: 30px; border-left: 4px solid var(--accent); }
.map-btn { display: inline-flex; align-items: center; gap: 10px; background: #fff; color: #000; padding: 10px 20px; margin-top: 15px; text-decoration: none; font-weight: bold; border-radius: 4px; }

.mini-map { width: 100%; height: 350px; border: 2px solid var(--accent); margin-top: 20px; filter: grayscale(1) invert(0.9); }

/* SOCIAL MEDIA */
.social-section { text-align: center; padding: 60px 0; background: #050505; }
.social-icons { display: flex; justify-content: center; gap: 40px; margin-top: 30px; }
.social-icons a { color: #fff; transition: .3s; transform: scale(1); }
.social-icons a:hover { color: var(--accent); transform: scale(1.2); }

/* FLOATING WHATSAPP */
.whatsapp-float{position:fixed;bottom:25px;right:25px;display:flex;align-items:center;justify-content:center;gap:12px;background:#25D366;color:#000;padding:18px;border-radius:50px;box-shadow:0 0 25px rgba(37,211,102,.6);z-index:3000;transition:var(--transition);width:70px;height:70px;text-decoration:none; overflow: hidden;}
.whatsapp-float .wa-text{white-space:nowrap;font-family:'Teko';font-size:1.3rem;display:none;}
.whatsapp-float:hover{width:240px;}
.whatsapp-float:hover .wa-text{display: block;}

/* RESPONSIVE */
@media(max-width:768px){
    nav .links { display: none; }
    header p { font-size: 1rem; }
    section { padding: 60px 5%; }
}
</style>
</head>

